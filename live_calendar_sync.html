<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ライブカレンダー</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --accent:#0284c7;--accent-light:#9be1ff;--dot:#0369a1;
  --bg:#f6f7f9;--card:#fff;--border:#e2e4e9;--border-light:#eceef2;
  --text:#1a1d23;--text2:#6b7280;--radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:700px;margin:0 auto;padding:1rem .75rem 5rem}
h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:6px}
.icon-btn{background:none;border:none;cursor:pointer;font-size:19px;color:var(--text2);padding:4px 7px;border-radius:var(--radius-sm)}
.icon-btn:hover{background:var(--border-light);color:var(--text)}
.month-lbl{font-size:15px;font-weight:600;min-width:118px;text-align:center}
.palette-wrap{position:relative;display:flex;align-items:center;gap:5px}
.pal-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 8px;cursor:pointer;font-size:15px;display:flex;align-items:center;color:var(--text2)}
.pal-btn:hover{background:var(--border-light)}
.theme-dd{position:absolute;top:calc(100% + 5px);right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px;display:none;flex-wrap:wrap;gap:6px;width:148px;z-index:60;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.theme-dd.open{display:flex}
.tswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.tswatch.active{border-color:var(--text);transform:scale(1.2)}
.add-btn{background:var(--dot);color:#fff;border:none;border-radius:var(--radius-sm);padding:5px 13px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500}
.add-btn:hover{opacity:.85}
.sync-indicator{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;background:var(--border-light)}
.sync-indicator.syncing{color:#f59e0b}
.sync-indicator.ok{color:#10b981}
.sync-indicator.err{color:#ef4444}
.tag-filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.9rem;align-items:center}
.tag-filter-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.tag-filter-chip.all{background:var(--dot);color:#fff;border-color:var(--dot)}
.tag-filter-chip.all.inactive{background:none;color:var(--dot);border-color:var(--dot)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:1rem}
.day-hdr{text-align:center;font-size:10px;color:var(--text2);padding:3px 0}
.day-cell{min-height:48px;border-radius:var(--radius-sm);border:1px solid var(--border-light);padding:3px;cursor:pointer;background:var(--card);transition:background .1s}
.day-cell:hover{background:#f0f4ff}
.day-cell.other{opacity:.28}
.day-cell.today .dnum{background:#f41010;color:#fff;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.day-cell.sel{border-color:var(--dot);border-width:1.5px}
.dnum{font-size:11px;font-weight:500;width:21px;height:21px;display:flex;align-items:center;justify-content:center}
.ev-chip{font-size:8.5px;border-radius:3px;padding:1px 3px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.panel{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.panel-title{font-size:13px;font-weight:500;color:var(--text2)}
.add-day-btn{background:var(--dot);color:#fff;border:none;border-radius:var(--radius-sm);padding:3px 9px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:3px}
.ev-list{display:flex;flex-direction:column;gap:.65rem}
.ev-card{border-radius:var(--radius);overflow:hidden;background:var(--card);position:relative;display:flex;border:1px solid var(--border-light)}
.ev-accent{width:5px;flex-shrink:0}
.ev-inner{flex:1;min-width:0;position:relative}
.ev-actions{position:absolute;top:7px;right:7px;display:flex;gap:3px;z-index:2}
.aico{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:5px;width:25px;height:25px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text2)}
.aico:hover{background:var(--border-light)}
.aico.del:hover{color:#dc2626}
.flyer-wrap{width:100%;max-height:280px;overflow:hidden;background:#f3f4f6}
.flyer-wrap img{width:100%;max-height:280px;object-fit:contain;display:block}
.ev-body{padding:.6rem .7rem}
.ev-title{font-size:13.5px;font-weight:600;margin-bottom:4px;padding-right:86px}
.ev-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.ev-tag{display:inline-flex;align-items:center;gap:2px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.ev-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.meta-chip{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:2px}
.time-row{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.tbadge{border:1px solid var(--dot);border-radius:5px;padding:2px 7px;display:flex;align-items:center;gap:3px}
.tbadge-lbl{font-size:8.5px;color:var(--dot)}
.tbadge-val{font-size:10.5px;font-weight:600;color:var(--dot)}
.ticket-sm{display:inline-flex;align-items:center;gap:3px;border:1px solid var(--dot);color:var(--dot);border-radius:5px;padding:2px 9px;font-size:10px;cursor:pointer;text-decoration:none;background:none;margin-bottom:4px}
.ticket-sm:hover{background:var(--accent-light)}
.ev-detail{font-size:11px;color:var(--text2);white-space:pre-wrap;line-height:1.6;margin-top:2px}
.empty{text-align:center;color:var(--text2);font-size:12px;padding:1.5rem}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:flex-end;justify-content:center;z-index:100}
@media(min-width:541px){.modal-bg{align-items:center}}
.modal{background:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:1.25rem;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
@media(min-width:541px){.modal{border-radius:var(--radius);width:92%}}
.modal h2{font-size:15px;font-weight:600;margin-bottom:.9rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:.65rem}
.form-row.single{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;color:var(--text2);font-weight:500}
.fg input,.fg select,.fg textarea{font-size:13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;color:var(--text);padding:6px 9px;width:100%;font-family:inherit}
.fg textarea{resize:vertical;min-height:56px}
.time-sel-row{display:flex;gap:5px;align-items:center}
.time-sel-row select{flex:1}
.time-sel-row span{font-size:13px;color:var(--text2)}
.drop-zone{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:.9rem;text-align:center;cursor:pointer;font-size:12px;color:var(--text2);transition:background .15s;position:relative}
.drop-zone:hover,.drop-zone.drag-over{background:#f0f4ff}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.modal-acts{display:flex;gap:7px;justify-content:flex-end;margin-top:.9rem}
.btn-p{border:none;border-radius:var(--radius-sm);padding:7px 18px;font-size:13px;cursor:pointer;background:var(--dot);color:#fff;font-weight:500}
.btn-p:hover{opacity:.85}
.btn-s{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 13px;font-size:13px;cursor:pointer;color:var(--text)}
.btn-s:hover{background:var(--border-light)}
.tag-editor{display:flex;flex-direction:column;gap:6px}
.tag-list-edit{display:flex;flex-wrap:wrap;gap:5px;min-height:28px}
.tag-edit-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;border:none}
.tag-colors{display:flex;gap:4px;flex-wrap:wrap}
.tc{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:transform .15s}
.tc.sel{border-color:var(--text);transform:scale(1.2)}
.tag-add-row{display:flex;gap:6px;align-items:center}
.tag-add-row input{flex:1;font-size:12px;border-radius:var(--radius-sm);border:1px solid var(--border);padding:5px 8px;font-family:inherit}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);font-size:12px;padding:6px 16px;border-radius:20px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;background:#222;color:#fff;white-space:nowrap}
.toast.show{opacity:1}
.mob-nav{display:none;align-items:center;gap:4px;margin-bottom:.75rem}
.mob-month{font-size:15px;font-weight:600;min-width:110px;text-align:center}
.mob-view{display:none;flex-direction:column;gap:0}
.mob-card{display:flex;border-bottom:1px solid var(--border-light);background:var(--card);cursor:pointer;align-items:stretch;min-height:68px;transition:background .1s}
.mob-card:first-child{border-radius:var(--radius) var(--radius) 0 0;border-top:1px solid var(--border-light)}
.mob-card:last-child{border-radius:0 0 var(--radius) var(--radius)}
.mob-card:only-child{border-radius:var(--radius)}
.mob-card:active{background:#f0f4ff}
.mob-acc{width:5px;flex-shrink:0}
.mob-date-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 10px;min-width:46px;border-right:1px solid var(--border-light)}
.mob-dnum{font-size:23px;font-weight:700;line-height:1;color:var(--text)}
.mob-dnum.td{color:#f41010}
.mob-dow{font-size:9px;color:var(--text2);margin-top:2px}
.mob-flyer-col{width:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:5px 3px 5px 7px}
.mob-flyer-img{width:52px;height:52px;border-radius:6px;object-fit:cover;border:1px solid var(--border-light)}
.mob-flyer-ph{width:52px;height:52px;border-radius:6px;background:var(--border-light);display:flex;align-items:center;justify-content:center;color:var(--border);font-size:18px}
.mob-info{flex:1;padding:8px 6px 8px 9px;display:flex;flex-direction:column;justify-content:center;min-width:0}
.mob-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mob-venue{font-size:10px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mob-times{font-size:10px;color:var(--dot);margin-top:2px;font-weight:500}
.mob-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.mob-tag{font-size:9px;font-weight:500;padding:1px 6px;border-radius:10px}
.mob-chev{display:flex;align-items:center;padding-right:9px;color:var(--border);font-size:13px}
.mob-add-fab{position:fixed;bottom:1.3rem;right:1.3rem;background:var(--dot);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:26px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:30;box-shadow:0 3px 14px rgba(0,0,0,.22)}
.mob-empty{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius)}
@media(max-width:540px){
  .desk-only{display:none!important}
  .mob-nav{display:flex}
  .mob-view{display:flex}
  .mob-add-fab{display:flex}
}
</style>
</head>
<body>
<div class="app">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem">
    <h1><i class="ti ti-calendar-event"></i>ライブカレンダー</h1>
    <div class="sync-indicator" id="syncIndicator"><i class="ti ti-cloud"></i> 接続中...</div>
  </div>

  <div class="nav desk-only" style="display:flex;align-items:center;gap:5px;margin-bottom:.9rem">
    <button class="icon-btn" id="prevBtn"><i class="ti ti-chevron-left"></i></button>
    <span class="month-lbl" id="monthLabel"></span>
    <button class="icon-btn" id="nextBtn"><i class="ti ti-chevron-right"></i></button>
    <div class="palette-wrap" style="margin-left:auto">
      <button class="pal-btn" id="paletteBtn"><i class="ti ti-palette"></i></button>
      <div class="theme-dd" id="themeDD"></div>
      <button class="add-btn" id="addBtn"><i class="ti ti-plus"></i> 追加</button>
    </div>
  </div>

  <div class="mob-nav">
    <button class="icon-btn" id="mprevBtn"><i class="ti ti-chevron-left"></i></button>
    <span class="mob-month" id="mmonthLabel"></span>
    <button class="icon-btn" id="mnextBtn"><i class="ti ti-chevron-right"></i></button>
    <div class="palette-wrap" style="margin-left:auto">
      <button class="pal-btn" id="mpaletteBtn"><i class="ti ti-palette"></i></button>
      <div class="theme-dd" id="mthemeDD"></div>
    </div>
  </div>

  <div class="tag-filter-bar" id="tagFilterBar"></div>

  <div class="desk-only">
    <div class="cal-grid" id="calGrid"></div>
    <div class="panel">
      <div class="panel-hdr">
        <div class="panel-title" id="panelTitle">日付を選択してください</div>
        <button class="add-day-btn" id="addDayBtn" style="display:none"><i class="ti ti-plus"></i> この日にイベントを追加</button>
      </div>
      <div class="ev-list" id="eventList"></div>
    </div>
  </div>

  <div class="mob-view" id="mobileView"></div>
  <button class="mob-add-fab" id="mobAddBtn"><i class="ti ti-plus"></i></button>
</div>

<div id="modalContainer"></div>
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBS7xXoNd6GLIZOnDCHy-KYl-AhFty_xDg",
  authDomain: "live-calendar-332be.firebaseapp.com",
  projectId: "live-calendar-332be",
  storageBucket: "live-calendar-332be.firebasestorage.app",
  messagingSenderId: "228455930158",
  appId: "1:228455930158:web:38e5f33faec47477c742bf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const eventsCol = collection(db, "events");

const TAG_COLORS=[
  {bg:'#fde68a',text:'#92400e'},{bg:'#fed7aa',text:'#9a3412'},{bg:'#fca5a5',text:'#991b1b'},
  {bg:'#f9a8d4',text:'#9d174d'},{bg:'#d8b4fe',text:'#6b21a8'},{bg:'#a5b4fc',text:'#3730a3'},
  {bg:'#93c5fd',text:'#1e40af'},{bg:'#6ee7b7',text:'#065f46'},{bg:'#fde047',text:'#713f12'},
  {bg:'#f0abfc',text:'#701a75'},{bg:'#7dd3fc',text:'#0c4a6e'},{bg:'#86efac',text:'#14532d'},
];
const THEMES=[
  {accent:'#0284c7',light:'#9be1ff',dot:'#0369a1'},
  {accent:'#06b6d4',light:'#9be1ff',dot:'#0891b2'},
  {accent:'#1a1a2e',light:'#d0d0e8',dot:'#3a3a5c'},
  {accent:'#9b1d1d',light:'#ffd6d6',dot:'#c0392b'},
  {accent:'#283593',light:'#c5cae9',dot:'#3949ab'},
  {accent:'#1b5e20',light:'#c8e6c9',dot:'#2e7d32'},
  {accent:'#880e4f',light:'#f8bbd0',dot:'#ad1457'},
  {accent:'#4a148c',light:'#e1bee7',dot:'#6a1b9a'},
  {accent:'#b45309',light:'#fef3c7',dot:'#92400e'},
];
const DOW=['日','月','火','水','木','金','土'];

let currentTheme=0,currentDate=new Date(),mobileDate=new Date();
let selectedDate=null,editingId=null,flyerDataUrl=null,activeTagFilter=null,draftTags=[],selTagColorIdx=0;
let events=[];

// sync indicator
function setSyncStatus(s){
  const el=document.getElementById('syncIndicator');
  if(s==='ok'){el.className='sync-indicator ok';el.innerHTML='<i class="ti ti-cloud-check"></i> 同期済み';}
  else if(s==='syncing'){el.className='sync-indicator syncing';el.innerHTML='<i class="ti ti-cloud-upload"></i> 同期中...';}
  else{el.className='sync-indicator err';el.innerHTML='<i class="ti ti-cloud-off"></i> オフライン';}
}

// Firestoreリアルタイム同期
onSnapshot(eventsCol, (snapshot)=>{
  events=snapshot.docs.map(d=>({id:d.id,...d.data()}));
  setSyncStatus('ok');
  buildTagFilterBar();buildCalendar();renderPanel();renderMobile();
}, ()=>setSyncStatus('err'));

async function saveEventToFirestore(ev){
  setSyncStatus('syncing');
  try{
    await setDoc(doc(db,'events',ev.id),ev);
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}
async function deleteEventFromFirestore(id){
  setSyncStatus('syncing');
  try{
    await deleteDoc(doc(db,'events',id));
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

function applyTheme(t){const th=THEMES[t],s=document.documentElement.style;s.setProperty('--accent',th.accent);s.setProperty('--accent-light',th.light);s.setProperty('--dot',th.dot);}
function buildDD(id){
  const dd=document.getElementById(id);
  dd.innerHTML=THEMES.map((t,i)=>`<div class="tswatch${i===currentTheme?' active':''}" style="background:${t.accent}" data-i="${i}"></div>`).join('');
  dd.querySelectorAll('.tswatch').forEach(s=>{s.addEventListener('click',ev=>{ev.stopPropagation();currentTheme=+s.dataset.i;applyTheme(currentTheme);buildDD('themeDD');buildDD('mthemeDD');dd.classList.remove('open');buildCalendar();renderPanel();renderMobile();});});
}
['paletteBtn','mpaletteBtn'].forEach((id,i)=>{document.getElementById(id).addEventListener('click',e=>{e.stopPropagation();document.getElementById(i===0?'themeDD':'mthemeDD').classList.toggle('open');});});
document.addEventListener('click',()=>{document.getElementById('themeDD').classList.remove('open');document.getElementById('mthemeDD').classList.remove('open');});

function dStr(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function todayStr(){const n=new Date();return dStr(n.getFullYear(),n.getMonth(),n.getDate());}
function getEvs(ds){return events.filter(e=>e.date===ds);}
function allTags(){const map={};events.forEach(e=>(e.tags||[]).forEach(t=>{map[t.name]={...t};}));return Object.values(map);}

function buildTagFilterBar(){
  const bar=document.getElementById('tagFilterBar');const tags=allTags();
  if(!tags.length){bar.innerHTML='';return;}
  const allActive=activeTagFilter===null;
  let html=`<span style="font-size:11px;color:var(--text2);flex-shrink:0"><i class="ti ti-filter" style="font-size:12px"></i></span>`;
  html+=`<div class="tag-filter-chip all${allActive?'':' inactive'}" data-tag="__all__">すべて</div>`;
  html+=tags.map(t=>`<div class="tag-filter-chip" style="background:${activeTagFilter===t.name?t.bg:'#fff'};color:${t.text};border-color:${t.bg}" data-tag="${t.name}">${t.name}</div>`).join('');
  bar.innerHTML=html;
  bar.querySelectorAll('.tag-filter-chip').forEach(c=>{c.addEventListener('click',()=>{activeTagFilter=c.dataset.tag==='__all__'?null:c.dataset.tag;buildTagFilterBar();renderPanel();renderMobile();buildCalendar();});});
}

function buildCalendar(){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  document.getElementById('monthLabel').textContent=`${y}年 ${m+1}月`;
  const grid=document.getElementById('calGrid');
  let html=DOW.map(d=>`<div class="day-hdr">${d}</div>`).join('');
  const first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate(),prevLast=new Date(y,m,0).getDate(),td=todayStr();
  for(let i=0;i<first;i++){const d=prevLast-first+1+i;html+=`<div class="day-cell other"><div class="dnum">${d}</div></div>`;}
  for(let d=1;d<=last;d++){
    const ds=dStr(y,m,d);const evs=getEvs(ds).filter(e=>!activeTagFilter||(e.tags||[]).some(t=>t.name===activeTagFilter));
    let cls=`day-cell${ds===td?' today':''}${ds===selectedDate?' sel':''}`;
    let inner=`<div class="dnum">${d}</div>`;
    evs.slice(0,2).forEach(e=>{const tc=e.tags&&e.tags.length?e.tags[0]:{bg:'#e0f2fe',text:'#0369a1'};inner+=`<div class="ev-chip" style="background:${tc.bg};color:${tc.text}">${e.title||'(無題)'}</div>`;});
    if(evs.length>2)inner+=`<div class="ev-chip" style="background:#e5e7eb;color:#374151">+${evs.length-2}</div>`;
    html+=`<div class="${cls}" data-date="${ds}">${inner}</div>`;
  }
  for(let d=1;d<=42-first-last;d++){html+=`<div class="day-cell other"><div class="dnum">${d}</div></div>`;}
  grid.innerHTML=html;
  grid.querySelectorAll('.day-cell:not(.other)').forEach(c=>{c.addEventListener('click',()=>{selectedDate=c.dataset.date;buildCalendar();renderPanel();});});
}

function timeBadgesHTML(e){
  if(e.openH==null&&e.startH==null)return '';
  const dc=e.tags&&e.tags.length?e.tags[0].text:'var(--dot)';
  let html=`<div class="time-row">`;
  if(e.openH!=null)html+=`<div class="tbadge" style="border-color:${dc}"><span class="tbadge-lbl" style="color:${dc}">開場</span><span class="tbadge-val" style="color:${dc}">${String(e.openH).padStart(2,'0')}<span style="font-size:8px;opacity:.7">時</span>${String(e.openM||0).padStart(2,'0')}<span style="font-size:8px;opacity:.7">分</span></span></div>`;
  if(e.startH!=null)html+=`<div class="tbadge" style="border-color:${dc}"><span class="tbadge-lbl" style="color:${dc}">開演</span><span class="tbadge-val" style="color:${dc}">${String(e.startH).padStart(2,'0')}<span style="font-size:8px;opacity:.7">時</span>${String(e.startM||0).padStart(2,'0')}<span style="font-size:8px;opacity:.7">分</span></span></div>`;
  return html+'</div>';
}

function eventCardHTML(e){
  const ac=e.tags&&e.tags.length?e.tags[0].bg:'var(--dot)';
  const dc=e.tags&&e.tags.length?e.tags[0].text:'var(--dot)';
  const tagsHTML=(e.tags||[]).map(t=>`<span class="ev-tag" style="background:${t.bg};color:${t.text}">${t.name}</span>`).join('');
  return `<div class="ev-card"><div class="ev-accent" style="background:${ac}"></div><div class="ev-inner">
    <div class="ev-actions">
      <div class="aico" onclick="openEditModal('${e.id}')"><i class="ti ti-edit"></i></div>
      <div class="aico" onclick="copyEvent('${e.id}')"><i class="ti ti-copy"></i></div>
      <div class="aico del" onclick="deleteEvent('${e.id}')"><i class="ti ti-trash"></i></div>
    </div>
    ${e.flyer?`<div class="flyer-wrap"><img src="${e.flyer}" alt="フライヤー"></div>`:''}
    <div class="ev-body">
      <div class="ev-title">${e.title||'(無題)'}</div>
      ${tagsHTML?`<div class="ev-tags">${tagsHTML}</div>`:''}
      ${e.venue?`<div class="ev-meta"><span class="meta-chip"><i class="ti ti-map-pin" style="font-size:11px"></i>${e.venue}</span></div>`:''}
      ${timeBadgesHTML(e)}
      ${e.ticket?`<a class="ticket-sm" href="${e.ticket}" target="_blank" style="border-color:${dc};color:${dc}"><i class="ti ti-ticket" style="font-size:11px"></i> チケット購入</a>`:''}
      ${e.detail?`<div class="ev-detail">${e.detail}</div>`:''}
    </div>
  </div></div>`;
}

function renderPanel(){
  const title=document.getElementById('panelTitle'),list=document.getElementById('eventList'),btn=document.getElementById('addDayBtn');
  if(!selectedDate){title.textContent='日付を選択してください';list.innerHTML='';btn.style.display='none';return;}
  const[y,mo,d]=selectedDate.split('-');title.textContent=`${y}年${mo}月${d}日`;
  btn.style.display='flex';btn.onclick=()=>openAddModal();
  let evs=getEvs(selectedDate);if(activeTagFilter)evs=evs.filter(e=>(e.tags||[]).some(t=>t.name===activeTagFilter));
  list.innerHTML=evs.length?evs.map(eventCardHTML).join(''):`<div class="empty"><i class="ti ti-calendar-off" style="font-size:22px;display:block;margin-bottom:6px"></i>イベントなし</div>`;
}

function renderMobile(){
  const mv=document.getElementById('mobileView');const y=mobileDate.getFullYear(),m=mobileDate.getMonth();
  document.getElementById('mmonthLabel').textContent=`${y}年 ${m+1}月`;const td=todayStr();
  let evs=events.filter(e=>{if(!e.date)return false;const[ey,em]=e.date.split('-');return +ey===y&&+em===m+1;});
  if(activeTagFilter)evs=evs.filter(e=>(e.tags||[]).some(t=>t.name===activeTagFilter));
  evs.sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:0);
  if(!evs.length){mv.innerHTML=`<div class="empty mob-empty"><i class="ti ti-calendar-off" style="font-size:26px;display:block;margin-bottom:6px"></i>この月のイベントなし<br><span style="font-size:11px;margin-top:5px;display:block">右下の＋から追加できます</span></div>`;return;}
  mv.innerHTML=evs.map(e=>{
    const d=e.date?+e.date.split('-')[2]:0;const dow=e.date?DOW[new Date(e.date+'T00:00:00').getDay()]:'';const isToday=e.date===td;
    const times=[];if(e.openH!=null)times.push(`開場 ${String(e.openH).padStart(2,'0')}:${String(e.openM||0).padStart(2,'0')}`);if(e.startH!=null)times.push(`開演 ${String(e.startH).padStart(2,'0')}:${String(e.startM||0).padStart(2,'0')}`);
    const ac=e.tags&&e.tags.length?e.tags[0].bg:'var(--dot)';
    const tagsHTML=(e.tags||[]).map(t=>`<span class="mob-tag" style="background:${t.bg};color:${t.text}">${t.name}</span>`).join('');
    return `<div class="mob-card" onclick="openMobileDetail('${e.id}')">
      <div class="mob-acc" style="background:${ac}"></div>
      <div class="mob-date-col"><div class="mob-dnum${isToday?' td':''}">${d}</div><div class="mob-dow">${dow}</div></div>
      <div class="mob-flyer-col">${e.flyer?`<img class="mob-flyer-img" src="${e.flyer}" alt="">`:`<div class="mob-flyer-ph"><i class="ti ti-photo" style="font-size:17px"></i></div>`}</div>
      <div class="mob-info">
        <div class="mob-title">${e.title||'(無題)'}</div>
        ${e.venue?`<div class="mob-venue"><i class="ti ti-map-pin" style="font-size:9px"></i> ${e.venue}</div>`:''}
        ${times.length?`<div class="mob-times">${times.join('　')}</div>`:''}
        ${tagsHTML?`<div class="mob-tags">${tagsHTML}</div>`:''}
      </div>
      <div class="mob-chev"><i class="ti ti-chevron-right"></i></div>
    </div>`;
  }).join('');
}

window.openMobileDetail=function(id){
  const e=events.find(x=>x.id===id);if(!e)return;
  const[y,mo,d]=e.date?e.date.split('-'):['','',''];const dow=e.date?DOW[new Date(e.date+'T00:00:00').getDay()]:'';
  const tagsHTML=(e.tags||[]).map(t=>`<span class="ev-tag" style="background:${t.bg};color:${t.text}">${t.name}</span>`).join('');
  document.getElementById('modalContainer').innerHTML=`<div class="modal-bg" id="modalBg"><div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem">
      <h2 style="margin:0;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px">${e.title||'(無題)'}</h2>
      <div style="display:flex;gap:3px;flex-shrink:0">
        <div class="aico" onclick="closeModal();openEditModal('${e.id}')"><i class="ti ti-edit"></i></div>
        <div class="aico" onclick="copyEvent('${e.id}')"><i class="ti ti-copy"></i></div>
        <div class="aico del" onclick="deleteEvent('${e.id}')"><i class="ti ti-trash"></i></div>
      </div>
    </div>
    ${e.flyer?`<img src="${e.flyer}" style="width:100%;max-height:210px;object-fit:contain;border-radius:var(--radius);margin-bottom:.7rem">`:''}
    ${tagsHTML?`<div class="ev-tags" style="margin-bottom:.5rem">${tagsHTML}</div>`:''}
    ${e.date?`<div style="font-size:11px;color:var(--text2);margin-bottom:5px">${y}年${mo}月${d}日（${dow}）${e.venue?' · '+e.venue:''}</div>`:''}
    ${timeBadgesHTML(e)}
    ${e.ticket?`<a class="ticket-sm" href="${e.ticket}" target="_blank" style="margin-top:5px"><i class="ti ti-ticket" style="font-size:11px"></i> チケット購入</a>`:''}
    ${e.detail?`<div class="ev-detail" style="margin-top:7px">${e.detail}</div>`:''}
    <div class="modal-acts"><button class="btn-s" id="cancelBtn">閉じる</button></div>
  </div></div>`;
  document.getElementById('cancelBtn').addEventListener('click',closeModal);
  document.getElementById('modalBg').addEventListener('click',ev=>{if(ev.target.id==='modalBg')closeModal();});
};

function renderTagEditor(container){
  const colorsHTML=TAG_COLORS.map((c,i)=>`<div class="tc${i===selTagColorIdx?' sel':''}" style="background:${c.bg};border-color:${i===selTagColorIdx?c.text:'transparent'}" data-i="${i}"></div>`).join('');
  container.innerHTML=`
    <div class="tag-list-edit">${draftTags.map((t,i)=>`<div class="tag-edit-chip" style="background:${t.bg};color:${t.text}">${t.name} <span style="cursor:pointer;opacity:.7;font-size:13px" onclick="removeDraftTag(${i})">×</span></div>`).join('')}</div>
    <div class="tag-colors">${colorsHTML}</div>
    <div class="tag-add-row"><input id="tagNameInput" placeholder="タグ名を入力…" maxlength="12"><button type="button" class="btn-p" style="padding:5px 10px;font-size:12px;flex-shrink:0" onclick="addDraftTag()"><i class="ti ti-plus"></i> 追加</button></div>`;
  container.querySelectorAll('.tc').forEach(c=>{c.addEventListener('click',()=>{selTagColorIdx=+c.dataset.i;renderTagEditor(container);});});
  const inp=container.querySelector('#tagNameInput');if(inp)inp.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();addDraftTag();}});
}
window.addDraftTag=function(){const inp=document.getElementById('tagNameInput');if(!inp)return;const name=inp.value.trim();if(!name)return;const col=TAG_COLORS[selTagColorIdx];if(!draftTags.find(t=>t.name===name))draftTags.push({name,bg:col.bg,text:col.text});inp.value='';const te=document.getElementById('tagEditorWrap');if(te)renderTagEditor(te);};
window.removeDraftTag=function(i){draftTags.splice(i,1);const te=document.getElementById('tagEditorWrap');if(te)renderTagEditor(te);};

function hourOpts(sel){let o='';for(let h=0;h<24;h++){o+=`<option value="${h}"${h==sel?' selected':''}>${String(h).padStart(2,'0')}</option>`;}return o;}
function minOpts(sel){let o='';for(let m=0;m<60;m+=15){o+=`<option value="${m}"${m==sel?' selected':''}>${String(m).padStart(2,'0')}</option>`;}return o;}

function openAddModal(date){editingId=null;flyerDataUrl=null;draftTags=[];renderModal({date:date||selectedDate||todayStr()});}
window.openEditModal=function(id){editingId=id;const e=events.find(x=>x.id===id);flyerDataUrl=e.flyer||null;draftTags=[...(e.tags||[])];renderModal(e);};

function renderModal(e){
  const isEdit=!!editingId;
  document.getElementById('modalContainer').innerHTML=`<div class="modal-bg" id="modalBg"><div class="modal">
    <h2>${isEdit?'イベントを編集':'新しいイベントを追加'}</h2>
    <div class="form-row single"><div class="fg"><label>イベント名</label><input id="f-title" placeholder="ライブタイトル" value="${e.title||''}"></div></div>
    <div class="form-row">
      <div class="fg"><label>日付</label><input id="f-date" type="date" value="${e.date||''}"></div>
      <div class="fg"><label>会場</label><input id="f-venue" placeholder="会場名" value="${e.venue||''}"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>開場時間</label><div class="time-sel-row"><select id="f-openH">${hourOpts(e.openH??18)}</select><span>時</span><select id="f-openM">${minOpts(e.openM??0)}</select><span>分</span></div></div>
      <div class="fg"><label>開演時間</label><div class="time-sel-row"><select id="f-startH">${hourOpts(e.startH??19)}</select><span>時</span><select id="f-startM">${minOpts(e.startM??0)}</select><span>分</span></div></div>
    </div>
    <div class="form-row single"><div class="fg"><label>チケットURL</label><input id="f-ticket" placeholder="https://..." value="${e.ticket||''}"></div></div>
    <div class="form-row single"><div class="fg"><label>タグ</label><div class="tag-editor" id="tagEditorWrap"></div></div></div>
    <div class="form-row single"><div class="fg"><label>イベントフライヤー</label>
      <div class="drop-zone" id="dropZone"><input type="file" accept="image/*" id="flyerInput">
        <div id="flyerPreview">${flyerDataUrl?`<img src="${flyerDataUrl}" style="max-height:75px;border-radius:5px;display:block;margin:0 auto 5px"><span>画像選択済み</span>`:`<i class="ti ti-photo-up" style="font-size:19px;display:block;margin-bottom:3px"></i>タップまたはドラッグで選択`}</div>
      </div>
      ${flyerDataUrl?`<button type="button" class="btn-s" id="removeFlyerBtn" style="margin-top:5px;font-size:11px;padding:3px 9px"><i class="ti ti-trash"></i> フライヤーを削除</button>`:''}
    </div></div>
    <div class="form-row single"><div class="fg"><label>イベント詳細</label><textarea id="f-detail" placeholder="出演者・セットリスト・注意事項など">${e.detail||''}</textarea></div></div>
    <div class="modal-acts"><button class="btn-s" id="cancelBtn">キャンセル</button><button class="btn-p" id="saveBtn">${isEdit?'更新':'保存'}</button></div>
  </div></div>`;
  renderTagEditor(document.getElementById('tagEditorWrap'));
  const dz=document.getElementById('dropZone'),fi=document.getElementById('flyerInput');
  fi.addEventListener('change',()=>{if(fi.files[0])readFlyer(fi.files[0]);});
  dz.addEventListener('dragover',ev=>{ev.preventDefault();dz.classList.add('drag-over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',ev=>{ev.preventDefault();dz.classList.remove('drag-over');if(ev.dataTransfer.files[0])readFlyer(ev.dataTransfer.files[0]);});
  document.getElementById('cancelBtn').addEventListener('click',closeModal);
  document.getElementById('modalBg').addEventListener('click',ev=>{if(ev.target.id==='modalBg')closeModal();});
  document.getElementById('saveBtn').addEventListener('click',saveEvent);
  const rb=document.getElementById('removeFlyerBtn');
  if(rb)rb.addEventListener('click',()=>{flyerDataUrl=null;document.getElementById('flyerPreview').innerHTML=`<i class="ti ti-photo-up" style="font-size:19px;display:block;margin-bottom:3px"></i>タップまたはドラッグで選択`;rb.remove();});
}

function readFlyer(file){
  const r=new FileReader();r.onload=ev=>{
    flyerDataUrl=ev.target.result;
    document.getElementById('flyerPreview').innerHTML=`<img src="${flyerDataUrl}" style="max-height:75px;border-radius:5px;display:block;margin:0 auto 5px"><span>画像選択済み</span>`;
    const wrap=document.getElementById('dropZone').parentNode;
    if(!document.getElementById('removeFlyerBtn')){const b=document.createElement('button');b.type='button';b.className='btn-s';b.id='removeFlyerBtn';b.style.cssText='margin-top:5px;font-size:11px;padding:3px 9px';b.innerHTML='<i class="ti ti-trash"></i> フライヤーを削除';b.addEventListener('click',()=>{flyerDataUrl=null;document.getElementById('flyerPreview').innerHTML=`<i class="ti ti-photo-up" style="font-size:19px;display:block;margin-bottom:3px"></i>タップまたはドラッグで選択`;b.remove();});wrap.appendChild(b);}
  };r.readAsDataURL(file);
}

async function saveEvent(){
  const ev={
    id:editingId||('ev_'+Date.now()),
    title:document.getElementById('f-title').value.trim(),
    date:document.getElementById('f-date').value,
    venue:document.getElementById('f-venue').value.trim(),
    openH:+document.getElementById('f-openH').value,
    openM:+document.getElementById('f-openM').value,
    startH:+document.getElementById('f-startH').value,
    startM:+document.getElementById('f-startM').value,
    ticket:document.getElementById('f-ticket').value.trim(),
    tags:[...draftTags],
    flyer:flyerDataUrl||null,
    detail:document.getElementById('f-detail').value.trim(),
  };
  closeModal();
  if(ev.date)selectedDate=ev.date;
  await saveEventToFirestore(ev);
}

window.deleteEvent=async function(id){
  if(!confirm('このイベントを削除しますか？'))return;
  closeModal();
  await deleteEventFromFirestore(id);
};

window.copyEvent=function(id){
  const e=events.find(x=>x.id===id);if(!e)return;
  const lines=[e.title,e.date,e.venue?`会場: ${e.venue}`:'',e.openH!=null?`開場: ${String(e.openH).padStart(2,'0')}:${String(e.openM||0).padStart(2,'0')}`:'',e.startH!=null?`開演: ${String(e.startH).padStart(2,'0')}:${String(e.startM||0).padStart(2,'0')}`:'',e.tags&&e.tags.length?`タグ: ${e.tags.map(t=>t.name).join(', ')}`:'',e.ticket?`チケット: ${e.ticket}`:'',e.detail].filter(Boolean).join('\n');
  navigator.clipboard.writeText(lines).then(()=>showToast('コピーしました！'));
};

function closeModal(){document.getElementById('modalContainer').innerHTML='';flyerDataUrl=null;editingId=null;}
window.closeModal=closeModal;

document.getElementById('prevBtn').addEventListener('click',()=>{currentDate.setMonth(currentDate.getMonth()-1);buildCalendar();});
document.getElementById('nextBtn').addEventListener('click',()=>{currentDate.setMonth(currentDate.getMonth()+1);buildCalendar();});
document.getElementById('addBtn').addEventListener('click',()=>openAddModal());
document.getElementById('mprevBtn').addEventListener('click',()=>{mobileDate.setMonth(mobileDate.getMonth()-1);renderMobile();});
document.getElementById('mnextBtn').addEventListener('click',()=>{mobileDate.setMonth(mobileDate.getMonth()+1);renderMobile();});
document.getElementById('mobAddBtn').addEventListener('click',()=>openAddModal());

applyTheme(currentTheme);buildDD('themeDD');buildDD('mthemeDD');buildCalendar();renderPanel();renderMobile();
</script>
</body>
</html>
