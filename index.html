<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,interactive-widget=resizes-content">
<title>ライブカレンダー</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --accent:#4a9fd4;--accent-light:#e8f4ff;--dot:#5a9fd4;
  --bg:#FBFAFF;--card:#F4F6FA;--border:#dde1ec;--border-light:#e8ebf4;
  --text:#5a5d6b;--text2:#9295a5;--radius:10px;--radius-sm:6px;
}
/* テーマカラー */
.theme-pink{--bg:#FFF5F7;--card:#FDF0F3;--border:#f0c8d0;--border-light:#fae0e6}
.theme-mint{--bg:#F3FBF7;--card:#E9F7EF;--border:#b8dfc9;--border-light:#d4eede}
.theme-lavender{--bg:#F5F3FF;--card:#EDEAFF;--border:#c8c0f0;--border-light:#ddd8f8}
.theme-peach{--bg:#FFF8F3;--card:#FFF0E6;--border:#f0ccb0;--border-light:#fae0cc}
.theme-sky{--bg:#F3F8FF;--card:#E8F2FF;--border:#b8d4f0;--border-light:#d4e8f8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:700px;margin:0 auto;padding:1rem .75rem 5rem;position:relative}
h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:6px}
.icon-btn{background:none;border:none;cursor:pointer;font-size:19px;color:var(--text2);padding:4px 7px;border-radius:var(--radius-sm)}
.icon-btn:hover{background:var(--border-light);color:var(--text)}
.palette-wrap{position:relative;display:flex;align-items:center;gap:5px}.theme-dd{display:none!important}
.pal-btn{display:none}
.pal-btn:hover{background:var(--border-light)}
#paletteBtn,#mpaletteBtn{display:none!important}
.theme-dd{display:none!important}
.theme-dd.open{display:flex}
.tswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.tswatch.active{border-color:var(--text);transform:scale(1.2)}
.add-btn{background:var(--dot);color:#fff;border:none;border-radius:var(--radius-sm);padding:5px 13px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500}
.add-btn:hover{opacity:.85}
.sync-indicator{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;background:var(--border-light);white-space:nowrap}
.sync-indicator.syncing{color:#f59e0b}
.sync-indicator.ok{color:#10b981}
.sync-indicator.err{color:#ef4444}
.login-bar{display:none}
.login-bar .user-info{flex:1;color:var(--text2)}
.login-bar .user-info b{color:var(--text)}
.btn-login{background:var(--dot);color:#fff;border:none;border-radius:var(--radius-sm);padding:4px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-logout{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;font-size:11px;cursor:pointer;color:var(--text2)}
.tag-filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.9rem;align-items:center;position:sticky;top:96px;z-index:58;background:var(--bg);padding:4px 0}
.tag-filter-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);transition:all .15s}
.tag-filter-chip.all{background:var(--dot);color:#fff;border:1.5px solid var(--dot)}
.tag-filter-chip.all.inactive{background:none;color:var(--dot);border:1.5px solid var(--dot)}
/* カレンダー — 均等幅 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:1rem;width:100%}
.day-hdr{text-align:center;font-size:10px;color:var(--text2);padding:3px 0;width:100%}
.day-hdr.sat{color:#4a9fd4}
.day-hdr.sun{color:#e8547a}
.day-cell{min-height:52px;border-radius:var(--radius-sm);border:1px solid var(--border-light);padding:3px;cursor:pointer;background:var(--card);transition:background .1s;width:100%;min-width:0;overflow:hidden}
.day-cell:hover{background:#f0f4ff}
.day-cell.other{opacity:.28}
.day-cell.today .dnum{background:#f41010;color:#fff;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.day-cell.sel{border-color:var(--dot);border-width:1.5px}
.day-cell.sat-cell>.dnum{color:#4a9fd4}
.day-cell.sun-cell>.dnum,.day-cell.hol-cell>.dnum{color:#e8547a}
.dnum{font-size:11px;font-weight:500;width:21px;height:21px;display:flex;align-items:center;justify-content:center}
.ev-chip{font-size:8px;border-radius:3px;padding:1px 3px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block}
.panel{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.panel-title{font-size:13px;font-weight:500;color:var(--text2)}
.add-day-btn{background:var(--dot);color:#fff;border:none;border-radius:var(--radius-sm);padding:3px 9px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:3px}
.ev-list{display:flex;flex-direction:column;gap:.65rem}
.ev-card{border-radius:var(--radius);overflow:hidden;background:var(--card);position:relative;display:flex;border:1px solid var(--border-light)}
.ev-accent{width:5px;flex-shrink:0}
.ev-inner{flex:1;min-width:0;position:relative}
.ev-actions{position:absolute;top:7px;right:7px;display:flex;gap:3px;z-index:2}
.aico{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:5px;width:25px;height:25px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text2)}
.aico:hover{background:var(--border-light)}
.aico.del:hover{color:#e8547a}
/* カルーセル */
.carousel{position:relative;width:100%;background:var(--card);overflow:hidden}
.carousel-track{display:flex;transition:transform .3s ease}
.carousel-slide{flex-shrink:0;width:100%}
.carousel-slide img{width:100%;max-height:280px;object-fit:contain;display:block}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:3}
.carousel-btn.prev{left:6px}
.carousel-btn.next{right:6px}
.carousel-dots{display:flex;justify-content:center;gap:4px;padding:4px 0;background:var(--card)}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:#ccc;cursor:pointer}
.carousel-dot.active{background:var(--dot)}
.ev-body{padding:.6rem .7rem}
.ev-title{font-size:13.5px;font-weight:600;margin-bottom:4px;padding-right:86px}
.ev-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.ev-tag{display:inline-flex;align-items:center;gap:2px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;border:none}
.ev-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.meta-chip{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:2px}
.time-row{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;align-items:center}
.tbadge{border:1px solid var(--dot);border-radius:5px;padding:2px 7px;display:inline-flex;align-items:center;gap:3px;height:22px}
.tbadge-lbl{font-size:8.5px}
.tbadge-val{font-size:10.5px;font-weight:600}
.ticket-sm{display:inline-flex;align-items:center;gap:3px;border:1px solid var(--dot);color:var(--dot);border-radius:5px;padding:2px 9px;font-size:10px;cursor:pointer;text-decoration:none;background:none;height:22px}
.ticket-sm:hover{background:var(--accent-light)}
.ev-detail{font-size:11px;color:#454851;white-space:pre-wrap;line-height:1.6;margin-top:2px}
/* チェキ・セトリボタン */
.priv-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;margin-bottom:10px}
.priv-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);transition:all .15s}
.priv-btn:hover{border-color:var(--dot);color:var(--dot);background:var(--accent-light)}
.priv-btn.active{border-color:var(--dot);color:var(--dot);background:var(--accent-light)}
.priv-section{margin-top:8px;border-top:1px solid var(--border-light);padding-top:8px;margin-bottom:10px}
.login-required{font-size:11px;color:var(--text2);padding:6px;text-align:center}
/* チェキカルーセル */
.cheki-carousel{position:relative;width:100%;background:var(--border-light);border-radius:var(--radius-sm);overflow:hidden;min-height:80px}
.cheki-track{display:flex;transition:transform .3s ease}
.cheki-slide{flex-shrink:0;width:100%}
.cheki-slide img{width:100%;max-height:240px;object-fit:contain;display:block;cursor:zoom-in}
.cheki-empty{color:var(--text2);font-size:12px;text-align:center;padding:1.5rem}
.cheki-add-zone{border:1.5px dashed var(--dot);border-radius:var(--radius-sm);padding:.75rem;text-align:center;cursor:pointer;font-size:12px;color:var(--dot);position:relative;margin-top:6px;background:var(--accent-light)}
.cheki-add-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.cheki-add-zone:hover{opacity:.8}
/* チェキ編集モード */
.cheki-edit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px}
.cheki-edit-item{border-radius:var(--radius-sm);overflow:hidden;background:var(--border-light);display:flex;flex-direction:column}
.cheki-edit-item img{width:100%;aspect-ratio:1;object-fit:cover;cursor:zoom-in;display:block}
.cheki-edit-controls{display:flex;align-items:center;justify-content:space-between;padding:3px 4px;background:var(--bg);gap:2px}
.cheki-edit-btn{background:var(--border-light);border:none;border-radius:4px;width:26px;height:26px;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cheki-edit-btn:hover{background:var(--border)}
.cheki-edit-btn.del{margin-left:auto}
.cheki-edit-btn.del:hover{background:#fca5a5;color:#e8547a}
.cheki-edit-btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.cheki-edit-bar{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.cheki-edit-toggle{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2)}
.cheki-edit-toggle.active{border-color:var(--dot);color:var(--dot);background:var(--accent-light)}
/* 画像拡大オーバーレイ */
.img-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;cursor:zoom-out;animation:fadeIn .2s ease}
.img-overlay img{max-width:100%;max-height:90vh;border-radius:var(--radius);object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.img-overlay-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;border-radius:50%;width:34px;height:34px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.setlist-area{width:100%;min-height:100px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;font-size:16px;font-family:inherit;resize:vertical;color:var(--text);line-height:1.7}
.setlist-save-btn{margin-top:6px;background:var(--dot);color:#fff;border:none;border-radius:var(--radius-sm);padding:5px 14px;font-size:12px;cursor:pointer}
.empty{text-align:center;color:var(--text2);font-size:12px;padding:1.5rem}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:flex-end;justify-content:center;z-index:100}
@media(min-width:541px){.modal-bg{align-items:center}}
.modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:1.25rem 1.25rem 2rem;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
@media(min-width:541px){.modal{border-radius:var(--radius);width:92%}}
.modal h2{font-size:15px;font-weight:600;margin-bottom:.9rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:.65rem}
.form-row.single{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;color:var(--text2);font-weight:500}
.fg input,.fg select,.fg textarea{font-size:15px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;color:var(--text);padding:6px 9px;width:100%;font-family:inherit;box-sizing:border-box}
.fg textarea{resize:vertical;min-height:90px}
input[type=date]{min-width:0;width:100%}
.time-sel-row{display:flex;gap:5px;align-items:center}
.time-sel-row select{flex:1;min-width:0}
.time-sel-row span{font-size:13px;color:var(--text2)}
.drop-zone{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:.9rem;text-align:center;cursor:pointer;font-size:12px;color:var(--text2);transition:background .15s;position:relative}
.drop-zone:hover,.drop-zone.drag-over{background:#f0f4ff}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.modal-acts{display:flex;gap:7px;justify-content:flex-end;margin-top:.9rem}
.btn-p{border:none;border-radius:var(--radius-sm);padding:7px 18px;font-size:13px;cursor:pointer;background:var(--dot);color:#fff;font-weight:500}
.btn-p:hover{opacity:.85}
.btn-s{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 13px;font-size:13px;cursor:pointer;color:var(--text)}
.btn-s:hover{background:var(--border-light)}
.tag-editor{display:flex;flex-direction:column;gap:6px}
.tag-list-edit{display:flex;flex-wrap:wrap;gap:5px;min-height:28px}
.tag-edit-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;border:none;cursor:default}
.tag-colors{display:flex;gap:4px;flex-wrap:wrap}
.tc{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:transform .15s}
.tc.sel{border-color:var(--text);transform:scale(1.2)}
.tag-add-row{display:flex;gap:6px;align-items:center}
.tag-add-row input{flex:1;font-size:12px;border-radius:var(--radius-sm);border:1px solid var(--border);padding:5px 8px;font-family:inherit}
/* フライヤー複数枚プレビュー */
.flyer-previews{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.flyer-preview-item{position:relative;width:70px;height:70px}
.flyer-preview-item img{width:70px;height:70px;object-fit:cover;border-radius:5px;border:1px solid var(--border)}
.flyer-preview-item .rm-flyer{position:absolute;top:-4px;right:-4px;background:#dc2626;color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);font-size:12px;padding:6px 16px;border-radius:20px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;background:#222;color:#fff;white-space:nowrap}
.toast.show{opacity:1}
/* スマホ */
.mob-nav{display:none;align-items:center;gap:4px;margin-bottom:.75rem;position:sticky;top:46px;z-index:59;background:var(--bg);overflow:visible;padding:2px 0}
.mob-month{font-size:15px;font-weight:600;min-width:110px;text-align:center}
.mob-view{display:none;flex-direction:column;gap:0}
.mob-cal-overlay{display:none;background:var(--bg)}
.mob-cal-overlay.open{display:block}
.mob-cal-close{display:none}
.mob-card{display:flex;background:var(--card);cursor:pointer;align-items:stretch;min-height:68px;transition:background .1s;border-radius:var(--radius);border:1px solid var(--border-light);margin-bottom:6px;overflow:hidden}
.mob-card:first-child{}
.mob-card:last-child{margin-bottom:0}

.mob-card:active{background:#f0f4ff}
.mob-acc{width:5px;flex-shrink:0}
.mob-date-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 10px;width:52px;min-width:52px;max-width:52px;flex-shrink:0;border-right:1px solid var(--border-light);background:rgba(255,255,255,.72)}
.mob-dnum{font-size:17px;font-weight:600;line-height:1;color:var(--text);opacity:.85}
.mob-dnum.td{color:#f41010}
.mob-dnum.sat{color:#4a9fd4}
.mob-dnum.sun{color:#e8547a}
.mob-dow{font-size:9px;color:var(--text2);margin-top:2px}
.mob-dow.sat{color:#4a9fd4}
.mob-dow.sun{color:#e8547a}
.mob-flyer-col{width:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:5px 3px 5px 7px}
.mob-flyer-img{width:52px;height:52px;border-radius:6px;object-fit:cover;border:1px solid var(--border-light)}
.mob-flyer-ph{width:52px;height:52px;border-radius:6px;background:var(--border-light);display:flex;align-items:center;justify-content:center;color:var(--border);font-size:18px}
.mob-info{flex:1;padding:6px 6px 6px 9px;display:flex;flex-direction:column;justify-content:center;min-width:0}.mob-venue-row{display:flex;align-items:center;gap:4px;margin-bottom:2px}.mob-venue-badge{font-size:10px;color:var(--text2);background:var(--border-light);border-radius:4px;padding:1px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.mob-title-row{display:flex;align-items:baseline;gap:6px;min-width:0;overflow:hidden}
.mob-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;max-width:100%}
.mob-venue-inline{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0}
.mob-venue{font-size:10px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mob-times{font-size:10px;color:var(--dot);margin-top:2px;font-weight:500}
.mob-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.mob-tag{font-size:9px;font-weight:500;padding:1px 6px;border-radius:10px;border:none}
.mob-chev{display:flex;align-items:center;padding-right:9px;color:var(--border);font-size:13px}
.mob-add-fab{position:fixed;bottom:1.3rem;right:1.3rem;background:var(--dot);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:26px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:30;box-shadow:0 3px 14px rgba(0,0,0,.22)}
.mob-empty{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius)}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:540px){
  .desk-only{display:none!important}
  .mob-nav{display:flex}
  .mob-view{display:flex}
  .mob-add-fab{display:flex}
  .form-row{grid-template-columns:1fr!important}
  .form-row.two-col-mob{grid-template-columns:1fr 1fr!important}
  .form-row.two-col-mob .fg input,.form-row.two-col-mob .fg select{font-size:13px;padding:6px 5px}
  .form-row.two-col-mob .fg input[type=date]{font-size:12px;padding:6px 3px}
  .form-row.two-col-mob .fg .time-sel-row select{font-size:12px;padding:5px 2px}
  .form-row.two-col-mob .fg .time-sel-row span{font-size:11px}
}
.tag-tap-area{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px}
.tag-tap-chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;transition:opacity .15s}
.tag-tap-chip.already{cursor:pointer}
.tag-tap-chip:hover{filter:brightness(.95)}


/* セトリ テキスト表示 */
.setlist-text-display{font-size:12px;color:var(--text);white-space:pre-wrap;line-height:1.9;padding:8px 4px;font-family:inherit}
.setlist-edit-inline-btn{margin-top:6px;display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--text2);background:none;border:1px solid var(--border);border-radius:20px;padding:3px 10px;cursor:pointer}
.setlist-edit-inline-btn:hover{border-color:var(--dot);color:var(--dot);background:var(--accent-light)}
.setlist-area{width:100%;min-height:140px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:16px;font-family:inherit;resize:vertical;color:var(--text);line-height:1.8}
.setlist-empty{font-size:11px;color:var(--text2);padding:6px 4px;font-style:italic}

/* スマホタブ */
.mob-only{display:none}
@media(max-width:540px){.mob-only{display:block}}
.mob-tabs{display:none;gap:0;background:var(--card);border-radius:var(--radius);padding:3px;border:1px solid var(--border-light);position:sticky;top:0;z-index:60;margin-bottom:.75rem}
@media(max-width:540px){.mob-tabs{display:flex}}
.mob-tab{flex:1;padding:7px 4px;border:none;border-radius:8px;background:none;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.mob-tab.active{background:var(--bg);color:var(--dot);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
/* 年月ピッカー ポップアップ */
.picker-anchor{position:relative;display:inline-flex;flex-direction:column;align-items:center;overflow:visible}
.main-picker-popup{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);z-index:200;
  background:var(--bg);border:2px solid var(--border-light);border-radius:24px;
  padding:18px 16px 16px;width:240px;
  box-shadow:0 12px 40px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.06);
  animation:pickerIn .18s cubic-bezier(.34,1.56,.64,1)}
@keyframes pickerIn{from{opacity:0;transform:translateX(-50%) scale(.92)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.picker-years{display:flex;gap:5px;margin-bottom:14px;justify-content:center}
.picker-year-btn{padding:6px 12px;border-radius:999px;border:2px solid var(--border-light);background:var(--card);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;letter-spacing:.02em}
.picker-year-btn.sel{border-color:var(--dot);background:var(--dot);color:#fff;transform:scale(1.06)}
.picker-year-btn:not(.sel):hover{border-color:var(--dot);color:var(--dot);background:var(--accent-light)}
.picker-months{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.picker-month-btn{aspect-ratio:1;border-radius:50%;border:2px solid var(--border-light);background:var(--card);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;line-height:1}
.picker-month-btn.sel{border-color:var(--dot);background:var(--dot);color:#fff;transform:scale(1.1)}
.picker-month-btn:not(.sel):hover{border-color:var(--dot);color:var(--dot);background:var(--accent-light);transform:scale(1.05)}
.picker-overlay-bg{position:fixed;inset:0;z-index:199}
/* カラースウォッチ */
.color-swatch{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--border-light);cursor:pointer;transition:transform .15s,border-color .15s}
.color-swatch:hover,.color-swatch.active{transform:scale(1.2);border-color:var(--dot)}
</style>
</head>
<body>
<div class="app">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
    <h1><i class="ti ti-calendar-event"></i>ライブカレンダー</h1>
    <div style="display:flex;align-items:center;gap:6px">
    <div class="sync-indicator" id="syncIndicator"><i class="ti ti-cloud"></i> 接続中...</div>
    <button id="headerLogoutBtn" style="display:none;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 8px;font-size:11px;cursor:pointer;color:var(--text2)" onclick="signOut(auth).then(()=>location.reload())"><i class="ti ti-logout" style="font-size:11px"></i> ログアウト</button>

  <div class="nav desk-only" style="display:flex;align-items:center;gap:5px;margin-bottom:.5rem">
    <button class="icon-btn" id="prevBtn"><i class="ti ti-chevron-left"></i></button>
    <div class="picker-anchor"><button id="monthLabel" onclick="toggleMainPicker()" style="background:none;border:none;cursor:pointer;font-size:15px;font-weight:700;color:var(--text);min-width:118px;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 8px;border-radius:var(--radius-sm)"></button><div id="mainPickerWrapDesk" style="display:none"></div></div>
    <button class="icon-btn" id="nextBtn"><i class="ti ti-chevron-right"></i></button>
    <div class="palette-wrap" style="margin-left:auto;gap:6px">
      <div class="picker-anchor" style="position:relative"><button class="icon-btn desk-only" onclick="toggleColorPicker(event)" title="テーマカラー"><i class="ti ti-palette"></i></button><div id="colorPickerPopup" style="display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:1.5px solid var(--border-light);border-radius:16px;padding:14px;width:220px;box-shadow:0 8px 32px rgba(0,0,0,.13);z-index:300;animation:pickerIn .18s ease"><div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:600;text-align:center">テーマカラー</div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center"><button onclick="setThemeColor('')" class="color-swatch" style="background:#F4F6FA" title="デフォルト"></button><button onclick="setThemeColor('theme-pink')" class="color-swatch" style="background:#FDF0F3" title="ピンク"></button><button onclick="setThemeColor('theme-mint')" class="color-swatch" style="background:#E9F7EF" title="ミント"></button><button onclick="setThemeColor('theme-lavender')" class="color-swatch" style="background:#EDEAFF" title="ラベンダー"></button><button onclick="setThemeColor('theme-peach')" class="color-swatch" style="background:#FFF0E6" title="ピーチ"></button><button onclick="setThemeColor('theme-sky')" class="color-swatch" style="background:#E8F2FF" title="スカイ"></button></div></div></div>
      <div class="theme-dd" id="themeDD"></div>
      <button class="add-btn" id="addBtn"><i class="ti ti-plus"></i> 追加</button>
    </div>
  </div>
  <!-- スマホ タブ -->
  <div class="mob-tabs" id="mobTabs">
    <button class="mob-tab active" id="tabSchedule" onclick="switchMobTab('schedule')"><i class="ti ti-list"></i> スケジュール</button>
    <button class="mob-tab" id="tabCal" onclick="switchMobTab('cal')"><i class="ti ti-calendar-month"></i> カレンダー</button>
  </div>
  <div class="mob-nav">
    <button class="icon-btn" id="mprevBtn"><i class="ti ti-chevron-left"></i></button>
    <div class="picker-anchor"><button id="mmonthLabel" onclick="toggleMainPicker()" class="mob-month" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:15px;font-weight:700;color:var(--text);padding:4px 8px;border-radius:var(--radius-sm)"></button><div id="mainPickerWrap" style="position:absolute;top:100%;left:50%;transform:translateX(-50%);z-index:200;display:none"></div></div>
    <button class="icon-btn" id="mnextBtn"><i class="ti ti-chevron-right"></i></button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:4px">
      <button class="icon-btn" id="mobCalBtn" title="カレンダー表示" style="display:none"><i class="ti ti-calendar-month"></i></button>
      <div class="theme-dd" id="mthemeDD"></div>
      <button class="icon-btn" id="mobColorBtn" onclick="toggleColorPicker()" title="テーマカラー"><i class="ti ti-palette"></i></button>
    </div>
  </div>
  <!-- カラーピッカー -->
  <div id="colorPickerWrap" style="display:none;background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:12px;margin-bottom:.75rem" class="mob-only">
    <div style="font-size:11px;color:var(--text2);margin-bottom:8px;font-weight:500">テーマカラー</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="setThemeColor('')" class="color-swatch" style="background:#F4F6FA" title="デフォルト"></button>
      <button onclick="setThemeColor('theme-pink')" class="color-swatch" style="background:#FDF0F3" title="ピンク"></button>
      <button onclick="setThemeColor('theme-mint')" class="color-swatch" style="background:#E9F7EF" title="ミント"></button>
      <button onclick="setThemeColor('theme-lavender')" class="color-swatch" style="background:#EDEAFF" title="ラベンダー"></button>
      <button onclick="setThemeColor('theme-peach')" class="color-swatch" style="background:#FFF0E6" title="ピーチ"></button>
      <button onclick="setThemeColor('theme-sky')" class="color-swatch" style="background:#E8F2FF" title="スカイ"></button>
    </div>
  </div>

  <div class="tag-filter-bar" id="tagFilterBar"></div>

  <div class="desk-only">
    <div class="cal-grid" id="calGrid"></div>
    <div class="panel">
      <div class="panel-hdr">
        <div class="panel-title" id="panelTitle">日付を選択してください</div>
        <button class="add-day-btn" id="addDayBtn" style="display:none"><i class="ti ti-plus"></i> この日にイベントを追加</button>
      </div>
      <div class="ev-list" id="eventList"></div>
    </div>
  </div>
  <div class="mob-view" id="mobileView"></div>
  <button class="mob-add-fab" id="mobAddBtn"><i class="ti ti-plus"></i></button>
  <!-- スマホ用カレンダーオーバーレイ -->
  <div class="mob-cal-overlay" id="mobCalOverlay">
    <div id="mobCalCloseBtn" style="display:none"></div>
    <div style="padding:0">
      <div id="mobCalGrid"></div>
      <div class="panel" style="margin-top:12px">
        <div class="panel-hdr">
          <div class="panel-title" id="mobCalPanelTitle">日付を選択してください</div>
        </div>
        <div class="ev-list" id="mobCalEventList"></div>
      </div>
    </div>
  </div>
</div>
<div id="modalContainer"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBS7xXoNd6GLIZOnDCHy-KYl-AhFty_xDg",
  authDomain: "live-calendar-332be.firebaseapp.com",
  projectId: "live-calendar-332be",
  storageBucket: "live-calendar-332be.firebasestorage.app",
  messagingSenderId: "228455930158",
  appId: "1:228455930158:web:38e5f33faec47477c742bf"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const eventsCol = collection(db, "events");

// 日本の祝日（2025〜2026年主要分）
const HOLIDAYS = new Set([
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20',
  '2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06',
  '2025-07-21','2025-08-11','2025-09-15','2025-09-23','2025-10-13',
  '2025-11-03','2025-11-23','2025-11-24','2025-12-23',
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20',
  '2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23',
]);

function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=800;let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const data=canvas.toDataURL('image/jpeg',0.7);
        resolve({data,kb:Math.round(data.length*0.75/1024)});
      };img.src=ev.target.result;
    };reader.readAsDataURL(file);
  });
}

const TAG_COLORS=[
  {bg:'#fef9c3',text:'#92400e',name:'黄色'},
  {bg:'#ffedd5',text:'#9a3412',name:'オレンジ'},
  {bg:'#fee2e2',text:'#991b1b',name:'赤'},
  {bg:'#fce7f3',text:'#9d174d',name:'ピンク'},
  {bg:'#fae8ff',text:'#701a75',name:'ふじ色'},
  {bg:'#ede9fe',text:'#6b21a8',name:'紫'},
  {bg:'#e0e7ff',text:'#3730a3',name:'インディゴ'},
  {bg:'#e0f2fe',text:'#0c4a6e',name:'水色'},
  {bg:'#dcfce7',text:'#14532d',name:'薄緑'},
  {bg:'#f0fdf4',text:'#166534',name:'緑'},
  {bg:'#f1f5f9',text:'#334155',name:'グレー'},
  {bg:'#fdf4ff',text:'#701a75',name:'ラベンダー'},
];
const PRESET_TAGS=[
  {name:'色々な十字架',bg:'#D9D6E6',text:'#605A78'},
  {name:'ティンカーベル初野',bg:'#CFF3E4',text:'#3E8C72'},
];
const THEMES=[
  {accent:'#0284c7',light:'#bae6fd',dot:'#38bdf8'},
  {accent:'#06b6d4',light:'#bae6fd',dot:'#0891b2'},
  {accent:'#1a1a2e',light:'#d0d0e8',dot:'#3a3a5c'},
  {accent:'#9b1d1d',light:'#ffd6d6',dot:'#c0392b'},
  {accent:'#283593',light:'#c5cae9',dot:'#3949ab'},
  {accent:'#1b5e20',light:'#c8e6c9',dot:'#2e7d32'},
  {accent:'#880e4f',light:'#f8bbd0',dot:'#ad1457'},
  {accent:'#4a148c',light:'#e1bee7',dot:'#6a1b9a'},
  {accent:'#b45309',light:'#fef3c7',dot:'#92400e'},
];
const DOW=['日','月','火','水','木','金','土'];
let currentTheme=0,currentDate=new Date(),mobileDate=new Date();
let selectedDate=null,editingId=null,flyerDataUrls=[],activeTagFilter=null,draftTags=[],selTagColorIdx=0;
let events=[],currentUser=null;

// ログイン状態
onAuthStateChanged(auth,user=>{
  const hLBtn=document.getElementById('headerLogoutBtn');if(hLBtn)hLBtn.style.display=user?'block':'none';
  currentUser=user;
  const bar=document.getElementById('loginBar');
  const info=document.getElementById('userInfo');
  const btn=document.getElementById('loginBtn');
  if(user){
    info.innerHTML=`<b>${user.displayName||user.email}</b> でログイン中`;
    btn.textContent='ログアウト';btn.onclick=()=>signOut(auth);
    btn.className='btn-logout';
    // syncIndicatorにログアウトボタンを追加
    const si=document.getElementById('syncIndicator');
    if(si&&!document.getElementById('syncLogoutBtn')){
      const lb=document.createElement('button');
      lb.id='syncLogoutBtn';
      lb.textContent='ログアウト';
      lb.style.cssText='font-size:10px;border:1px solid var(--border);background:none;border-radius:10px;padding:1px 7px;cursor:pointer;color:var(--text2);margin-left:4px';
      lb.onclick=()=>signOut(auth);
      si.appendChild(lb);
    }
  } else {
    info.textContent='ログインするとチェキ・セトリを記録できます';
    btn.innerHTML='<i class="ti ti-brand-google"></i> Googleでログイン';
    btn.className='btn-login';
    btn.onclick=()=>signInWithPopup(auth,provider);
    // ログアウトボタンを削除
    const lb=document.getElementById('syncLogoutBtn');if(lb)lb.remove();
    // ログインボタンをsyncIndicatorの隣に
    const si=document.getElementById('syncIndicator');
    if(si&&!document.getElementById('syncLoginBtn')){
      const loginB=document.createElement('button');
      loginB.id='syncLoginBtn';
      loginB.innerHTML='<i class="ti ti-brand-google" style="font-size:10px"></i> ログイン';
      loginB.style.cssText='font-size:10px;border:none;background:var(--dot);color:#fff;border-radius:10px;padding:2px 8px;cursor:pointer;margin-left:4px';
      loginB.onclick=()=>signInWithPopup(auth,provider);
      si.parentNode.insertBefore(loginB,si.nextSibling);
    }
  }
  renderPanel();renderMobile();
});

function setSyncStatus(s){
  const el=document.getElementById('syncIndicator');
  if(s==='ok'){el.className='sync-indicator ok';el.innerHTML='<i class="ti ti-cloud-check"></i> 同期済み';}
  else if(s==='syncing'){el.className='sync-indicator syncing';el.innerHTML='<i class="ti ti-cloud-upload"></i> 同期中...';}
  else{el.className='sync-indicator err';el.innerHTML='<i class="ti ti-cloud-off"></i> オフライン';}
}

onSnapshot(eventsCol,snap=>{
  events=snap.docs.map(d=>({id:d.id,...d.data()}));
  setSyncStatus('ok');
  buildTagFilterBar();buildCalendar();renderPanel();renderMobile();
},()=>setSyncStatus('err'));

async function saveEventToDb(ev){setSyncStatus('syncing');try{await setDoc(doc(db,'events',ev.id),ev);setSyncStatus('ok');}catch(e){setSyncStatus('err');showToast('保存に失敗しました');}}
async function deleteEventFromDb(id){setSyncStatus('syncing');try{await deleteDoc(doc(db,'events',id));setSyncStatus('ok');}catch(e){setSyncStatus('err');}}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function applyTheme(t){const th=THEMES[t],s=document.documentElement.style;s.setProperty('--accent',th.accent);s.setProperty('--accent-light',th.light);s.setProperty('--dot',th.dot);}
function buildDD(id){
  const dd=document.getElementById(id);
  dd.innerHTML=THEMES.map((t,i)=>`<div class="tswatch${i===currentTheme?' active':''}" style="background:${t.accent}" data-i="${i}"></div>`).join('');
  dd.querySelectorAll('.tswatch').forEach(s=>{s.addEventListener('click',ev=>{ev.stopPropagation();currentTheme=+s.dataset.i;
function scrollToNextEvent(){
  const mv=document.getElementById('mobileView');
  if(!mv)return;
  const cards=mv.querySelectorAll('[data-event-date]');
  if(!cards.length)return;
  const td=todayStr();
  let targetCard=null;
  cards.forEach(c=>{
    if(!targetCard&&c.dataset.eventDate>=td) targetCard=c;
  });
  if(targetCard){
    setTimeout(()=>{
      const rect=targetCard.getBoundingClientRect();
      const absTop=rect.top+window.scrollY;
      // sticky要素（mob-tabs + mob-nav + tag-filter-bar）の合計高さ分オフセット
      const tabsH=document.getElementById('mobTabs')?.offsetHeight||0;
      const navH=document.querySelector('.mob-nav')?.offsetHeight||0;
      const filterH=document.getElementById('tagFilterBar')?.offsetHeight||0;
      window.scrollTo({top:absTop-(tabsH+navH+filterH+6),behavior:'instant'});
    },80);
  }
}
applyTheme(currentTheme);buildDD('themeDD');buildDD('mthemeDD');dd.classList.remove('open');buildCalendar();renderPanel();renderMobile();});});
}
const _pb=document.getElementById('paletteBtn');if(_pb)_pb.addEventListener('click',e=>{e.stopPropagation();document.getElementById('themeDD')?.classList.toggle('open');});
document.addEventListener('click',()=>{document.getElementById('themeDD').classList.remove('open');document.getElementById('mthemeDD').classList.remove('open');});

function dStr(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function todayStr(){const n=new Date();return dStr(n.getFullYear(),n.getMonth(),n.getDate());}
function getEvs(ds){return events.filter(e=>e.date===ds);}
function allTags(){const map={};events.forEach(e=>(e.tags||[]).forEach(t=>{map[t.name]={...t};}));return Object.values(map);}
function isHoliday(ds){return HOLIDAYS.has(ds);}

function buildTagFilterBar(){
  const bar=document.getElementById('tagFilterBar');const tags=allTags();
  if(!tags.length){bar.innerHTML='';return;}
  let html=`<span style="font-size:11px;color:var(--text2);flex-shrink:0"><i class="ti ti-filter" style="font-size:12px"></i></span>`;
  html+=`<div class="tag-filter-chip all${activeTagFilter===null?'':' inactive'}" data-tag="__all__">すべて</div>`;
  html+=tags.map(t=>`<div class="tag-filter-chip" style="background:${activeTagFilter===t.name?t.bg:'var(--bg)'};color:${t.text};border-color:${t.text};${activeTagFilter===t.name?'font-weight:600':''}" data-tag="${t.name}">${t.name}</div>`).join('');
  bar.innerHTML=html;
  bar.querySelectorAll('.tag-filter-chip').forEach(c=>{c.addEventListener('click',()=>{activeTagFilter=c.dataset.tag==='__all__'?null:c.dataset.tag;buildTagFilterBar();renderPanel();renderMobile();buildCalendar();
    // カレンダーページが開いていれば再描画
    if(document.getElementById('mobCalOverlay')?.classList.contains('open'))buildMobCal();
  });});
}

function buildCalendar(){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  updateMainLabel('main',y,m);
  const grid=document.getElementById('calGrid');
  if(!grid)return;
  const DOW_H=['日','月','火','水','木','金','土'];
  let html=DOW_H.map((d,i)=>`<div class="day-hdr${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');
  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  const prevLast=new Date(y,m,0).getDate();
  const td=todayStr();
  for(let i=0;i<first;i++){
    const d=prevLast-first+1+i;
    html+=`<div class="day-cell other"><div class="dnum">${d}</div></div>`;
  }
  for(let d=1;d<=last;d++){
    const ds=dStr(y,m,d);
    const dow=new Date(y,m,d).getDay();
    const isSat=dow===6,isSun=dow===0,isHol=isHoliday(ds);
    const evs=getEvs(ds).filter(e=>!activeTagFilter||(e.tags||[]).some(t=>t.name===activeTagFilter));
    let cls=`day-cell${ds===td?' today':''}${ds===selectedDate?' sel':''}${isSat?' sat-cell':isSun||isHol?' sun-cell':''}`;
    let inner=`<div class="dnum">${d}</div>`;
    evs.slice(0,2).forEach(e=>{
      const tc=e.tags&&e.tags.length?e.tags[0]:{bg:'#e0f2fe',text:'#0369a1'};
      inner+=`<div class="ev-chip" style="background:${tc.bg};color:${tc.text}">${e.title||'(無題)'}</div>`;
    });
    if(evs.length>2)inner+=`<div class="ev-chip" style="background:#e5e7eb;color:#374151">+${evs.length-2}</div>`;
    html+=`<div class="${cls}" data-date="${ds}">${inner}</div>`;
  }
  const trail=42-first-last;
  for(let d=1;d<=trail;d++){
    html+=`<div class="day-cell other"><div class="dnum">${d}</div></div>`;
  }
  grid.innerHTML=html;
  grid.querySelectorAll('.day-cell:not(.other)').forEach(c=>{
    c.addEventListener('click',()=>{selectedDate=c.dataset.date;buildCalendar();renderPanel();});
  });
}

function carouselHTML(images,prefix){
  if(!images||!images.length)return '';
  if(images.length===1)return `<div class="carousel"><div class="carousel-track"><div class="carousel-slide"><img src="${images[0]}" alt="フライヤー" style="cursor:zoom-in" onclick="openImgOverlay('${images[0]}')"></div></div></div>`;
  const slides=images.map(src=>`<div class="carousel-slide"><img src="${src}" alt="フライヤー" style="cursor:zoom-in" onclick="openImgOverlay('${src}')"></div>`).join('');
  const dots=images.map((_,i)=>`<div class="carousel-dot${i===0?' active':''}" data-i="${i}"></div>`).join('');
  return `<div class="carousel" id="car-${prefix}">
    <div class="carousel-track" id="car-track-${prefix}">${slides}</div>
    <button class="carousel-btn prev" onclick="carMove('${prefix}',-1)"><i class="ti ti-chevron-left"></i></button>
    <button class="carousel-btn next" onclick="carMove('${prefix}',1)"><i class="ti ti-chevron-right"></i></button>
    <div class="carousel-dots" id="car-dots-${prefix}">${dots}</div>
  </div>`;
}

window.carMove=function(prefix,dir){
  const track=document.getElementById('car-track-'+prefix);
  const dots=document.getElementById('car-dots-'+prefix);
  if(!track)return;
  const slides=track.querySelectorAll('.carousel-slide');
  const allDots=dots?dots.querySelectorAll('.carousel-dot'):[];
  let cur=track.dataset.cur?+track.dataset.cur:0;
  cur=(cur+dir+slides.length)%slides.length;
  track.dataset.cur=cur;
  track.style.transform=`translateX(-${cur*100}%)`;
  allDots.forEach((d,i)=>d.classList.toggle('active',i===cur));
};

function timeBadgesHTML(e,includeTicket){

  if(!hasTime&&!ticketHtml)return '';
  let html=`<div class="time-row">`;

  if(e.startH!=null)html+=`<div class="tbadge" style="border-color:${dc}"><span class="tbadge-lbl" style="color:${dc}">開演</span><span class="tbadge-val" style="color:${dc}">${String(e.startH).padStart(2,'0')}<span style="font-size:8px;opacity:.7">時</span>${String(e.startM||0).padStart(2,'0')}<span style="font-size:8px;opacity:.7">分</span></span></div>`;

// チェキセクション描画（通常表示 / 編集モード切り替え対応）
function renderChekiSection(eid,ref,imgs,tagBg,tagText,contentEl,editMode){
  editMode=editMode||false;
  const ev=events.find(x=>x.id===eid);
  if(!tagBg){tagBg=ev&&ev.tags&&ev.tags.length?ev.tags[0].bg:'var(--accent-light)';}
  if(!tagText){tagText=ev&&ev.tags&&ev.tags.length?ev.tags[0].text:'var(--dot)';}

  // 通常表示（カルーセル）
  function normalView(){
    const slides=imgs.map(src=>`<div class="carousel-slide"><img src="${src}" alt="テェキ" style="cursor:zoom-in" onclick="openImgOverlay('${src}')"></div>`).join('');
    const dots=imgs.map((_,i)=>`<div class="carousel-dot${i===0?' active':''}" data-i="${i}"></div>`).join('');
    const carHtml=imgs.length
      ?`<div class="carousel" id="car-priv-${eid}">
          <div class="carousel-track" id="car-track-priv-${eid}">${slides}</div>
          ${imgs.length>1?`<button class="carousel-btn prev" onclick="carMove('priv-${eid}',-1)"><i class="ti ti-chevron-left"></i></button><button class="carousel-btn next" onclick="carMove('priv-${eid}',1)"><i class="ti ti-chevron-right"></i></button>`:''}
          ${imgs.length>1?`<div class="carousel-dots" id="car-dots-priv-${eid}">${dots}</div>`:''}
        </div>`
      :`<div class="cheki-empty">まだテェキがありません</div>`;
    const editBtn=imgs.length?`<button class="cheki-edit-toggle" onclick="renderChekiSection('${eid}',null,null,null,null,document.getElementById('priv-content-${eid}'),true)"><i class="ti ti-edit" style="font-size:11px"></i> 編集</button>`:'';
    contentEl.innerHTML=`<div class="priv-section">
      <div class="cheki-edit-bar">${editBtn}</div>
      <div style="border-radius:var(--radius-sm);overflow:hidden">${carHtml}</div>
      <div class="cheki-add-zone" style="border-color:${tagText};color:${tagText};background:${tagBg}22" id="cheki-add-${eid}">
        <input type="file" accept="image/*" multiple id="cheki-input-${eid}">
        <i class="ti ti-plus" style="font-size:16px;display:block;margin-bottom:3px"></i>テェキを追加
      </div>
    </div>`;
    document.getElementById('cheki-input-'+eid).addEventListener('change',async ev=>{
      const files=Array.from(ev.target.files);if(!files.length)return;
      document.getElementById('cheki-add-'+eid).innerHTML=`<i class="ti ti-loader-2" style="animation:spin 1s linear infinite;font-size:16px;display:block"></i>圧縮中...`;
      const compressed=await Promise.all(files.map(f=>compressImage(f)));
      const r=ref||doc(db,'events',eid,'private','cheki');
      const snap=await getDoc(r);const cur=(snap.exists()?snap.data().images:null)||[];
      const newImgs=[...cur,...compressed.map(c=>c.data)];
      await setDoc(r,{images:newImgs});
      showToast(`テェキを${files.length}枚追加しました！`);
      renderChekiSection(eid,r,newImgs,tagBg,tagText,contentEl,false);
    });
  }

  // 編集モード（グリッド表示＋削除・順番変更）
  function editView(){
    // Firestoreから最新を取得して編集
    const r=ref||doc(db,'events',eid,'private','cheki');
    getDoc(r).then(snap=>{
      const latestImgs=(snap.exists()?snap.data().images:null)||[];
      let workImgs=[...latestImgs];
      function renderGrid(){
        const grid=workImgs.map((src,i)=>`
          <div class="cheki-edit-item" data-i="${i}">
            <img src="${src}" onclick="openImgOverlay('${src}')">
            <div class="cheki-edit-controls">
              <button class="cheki-edit-btn" title="左へ" onclick="chekiMove(${i},-1)" ${i===0?'disabled':''}><i class="ti ti-arrow-left"></i></button>
              <button class="cheki-edit-btn" title="右へ" onclick="chekiMove(${i},1)" ${i===workImgs.length-1?'disabled':''}><i class="ti ti-arrow-right"></i></button>
              <button class="cheki-edit-btn del" title="削除" onclick="chekiDelete(${i})"><i class="ti ti-trash"></i></button>
            </div>
          </div>`).join('');
        contentEl.innerHTML=`<div class="priv-section">
          <div class="cheki-edit-bar">
            <button class="cheki-edit-toggle active"><i class="ti ti-edit" style="font-size:11px"></i> 編集中</button>
            <button class="cheki-edit-toggle" onclick="chekiSaveEdit()" style="border-color:var(--dot);color:var(--dot);background:var(--accent-light)"><i class="ti ti-check" style="font-size:11px"></i> 保存して戻る</button>
          </div>
          <div class="cheki-edit-grid" id="cheki-grid-${eid}">${workImgs.length?grid:'<div class="cheki-empty" style="grid-column:1/-1">テェキがありません</div>'}</div>
        </div>`;
        // 操作関数をwindowに登録
        window.chekiDelete=function(i){
          if(!confirm('このテェキを削除しますか？'))return;
          workImgs.splice(i,1);renderGrid();
        };
        window.chekiMove=function(i,dir){
          const j=i+dir;if(j<0||j>=workImgs.length)return;
          [workImgs[i],workImgs[j]]=[workImgs[j],workImgs[i]];renderGrid();
        };
        window.chekiSaveEdit=async function(){
          contentEl.innerHTML=`<div style="font-size:11px;color:var(--text2);padding:6px">保存中...</div>`;
          await setDoc(r,{images:workImgs});
          showToast('テェキを更新しました！');
          renderChekiSection(eid,r,workImgs,tagBg,tagText,contentEl,false);
        };
      }
      renderGrid();
    });
  }

  if(editMode){editView();}else{normalView();}
}

function eventCardHTML(e){
  const ac=e.tags&&e.tags.length?e.tags[0].bg:'var(--dot)';
  const dc=e.tags&&e.tags.length?e.tags[0].text:'var(--dot)';
  // ev-accent: bgを白に近づけた明るい色
  const _evAccent=(()=>{
    if(!e.tags||!e.tags.length)return 'var(--dot)';
    try{
      const b=e.tags[0].bg,t=e.tags[0].text,p=s=>parseInt(s,16),r=Math.round;
      // テキスト色を彩度そのまま60%明るくしてアクセントに
      const tr=p(t.slice(1,3)),tg=p(t.slice(3,5)),tb=p(t.slice(5,7));
      return 'rgb('+r(tr+(255-tr)*0.55)+','+r(tg+(255-tg)*0.55)+','+r(tb+(255-tb)*0.55)+')';
    }catch(err){return e.tags[0].bg;}
  })();
  const tagsHTML=(e.tags||[]).map(t=>`<span class="ev-tag" style="background:${t.bg};color:${t.text}">${t.name}</span>`).join('');
  const imgs=Array.isArray(e.flyer)?e.flyer:(e.flyer?[e.flyer]:[]);
  return `<div class="ev-card"><div class="ev-accent" style="background:${_evAccent}"></div><div class="ev-inner">

      <div class="aico" onclick="openEditModal('${e.id}')"><i class="ti ti-edit"></i></div>

  return `<div class="mob-card" data-event-date="${e.date}" onclick="openMobileDetail('${e.id}')">

      ${tagsHTML?`<div class="mob-tags">${tagsHTML}</div>`:''}

function renderTagEditor(container){
  // 既存タグ＋プリセットタグをまとめてタップ候補に（PRESET_TAGSは常に指定色で上書き）
  const usedMap={};
  events.forEach(e=>(e.tags||[]).forEach(t=>{usedMap[t.name]={bg:t.bg,text:t.text};}));
  PRESET_TAGS.forEach(t=>{usedMap[t.name]={bg:t.bg,text:t.text};});
  const tapTags=Object.entries(usedMap).map(([name,c])=>({name,...c}));

  const colorsHTML=TAG_COLORS.map((c,i)=>`<div class="tc${i===selTagColorIdx?' sel':''}" style="background:${c.bg};border-color:${i===selTagColorIdx?c.text:'transparent'}" title="${c.name||''}" data-i="${i}"></div>`).join('');

  const tapHTML=tapTags.length?tapTags.map(t=>{
    const already=!!draftTags.find(d=>d.name===t.name);
    return `<div class="tag-tap-chip${already?' already':''}" style="background:${t.bg};color:${t.text};opacity:${already?'0.4':'1'}" data-tname="${t.name}" data-tbg="${t.bg}" data-ttext="${t.text}">${t.name}${already?' ✓':''}</div>`;
  }).join(''):'';

  container.innerHTML=`
    ${tapHTML?`<div style="margin-bottom:8px"><div style="font-size:10px;color:var(--text2);margin-bottom:4px">タップして追加</div><div class="tag-tap-area">${tapHTML}</div></div>`:''}
    <div style="font-size:10px;color:var(--text2);margin-bottom:4px">新しいタグを作る</div>
    <div class="tag-list-edit">${draftTags.map((t,i)=>`<div class="tag-edit-chip" style="background:${t.bg};color:${t.text}">${t.name} <span style="cursor:pointer;opacity:.7;font-size:13px" onclick="removeDraftTag(${i})">×</span></div>`).join('')}</div>
    <div class="tag-colors">${colorsHTML}</div>
    <div class="tag-add-row"><input id="tagNameInput" placeholder="タグ名を入力…" maxlength="12"><button type="button" class="btn-p" style="padding:5px 10px;font-size:12px;flex-shrink:0" onclick="addDraftTag()"><i class="ti ti-plus"></i> 追加</button></div>`;

  // タップ追加チップのイベント
  container.querySelectorAll('.tag-tap-chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const name=chip.dataset.tname,bg=chip.dataset.tbg,text=chip.dataset.ttext;
      if(draftTags.find(t=>t.name===name)){draftTags=draftTags.filter(t=>t.name!==name);}
      else{draftTags.push({name,bg,text});}
      renderTagEditor(container);
    });
  });
  container.querySelectorAll('.tc').forEach(c=>{c.addEventListener('click',()=>{selTagColorIdx=+c.dataset.i;renderTagEditor(container);});});
  const inp=container.querySelector('#tagNameInput');
  if(inp)inp.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();addDraftTag();}});
}

window.resetAllTagColors=async function(){
  if(!confirm('全イベントのタグ色をリセットしますか？\n同じタグ名は同じ色に統一されます。'))return;
  // タグ名→色のマップを作成（PRESET_TAGSを優先、それ以外はTAG_COLORSを順番に割り当て）
  const tagMap={};let colorIdx=0;
  events.forEach(e=>(e.tags||[]).forEach(t=>{
    if(!tagMap[t.name]){
      const preset=PRESET_TAGS.find(p=>p.name===t.name);
      tagMap[t.name]=preset?{bg:preset.bg,text:preset.text}:TAG_COLORS[colorIdx++%TAG_COLORS.length];
    }
  }));
  // 全イベントのタグ色を更新
  const batch=[];
  events.forEach(e=>{
    if(!(e.tags&&e.tags.length))return;
    const newTags=e.tags.map(t=>({name:t.name,bg:tagMap[t.name].bg,text:tagMap[t.name].text}));
    e.tags=newTags;
    batch.push(setDoc(doc(db,'events',e.id),e));
  });
  await Promise.all(batch);
  showToast('タグ色をリセットしました！');
  buildCalendar();renderPanel();renderMobile();
};

let mobCalDate=new Date();
let mobCalSelected=null;

// 年月ピッカー表示状態
let mobCalPickerOpen=false;

function buildMobCal(){
  const grid=document.getElementById('mobCalGrid');
  if(!grid)return;
  const y=mobCalDate.getFullYear(),m=mobCalDate.getMonth();
  // カレンダータブ内の月ナビを更新
  let navEl=document.getElementById('mobCalNav');
  if(!navEl){
    navEl=document.createElement('div');
    navEl.id='mobCalNav';
    navEl.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px';
    grid.parentNode.insertBefore(navEl,grid);
  }
  navEl.innerHTML=`<button class="icon-btn" onclick="mobCalMonth(-1)"><i class="ti ti-chevron-left"></i></button>
    <button onclick="toggleMobCalPicker()" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:14px;font-weight:700;color:var(--text);padding:4px 8px;border-radius:var(--radius-sm)">${y}年${m+1}月 <i class="ti ti-chevron-${mobCalPickerOpen?'up':'down'}" style="font-size:12px;color:var(--text2)"></i></button>
    <button class="icon-btn" onclick="mobCalMonth(1)"><i class="ti ti-chevron-right"></i></button>`;
  const td=todayStr();
  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  const prevLast=new Date(y,m,0).getDate();

  // ── 年月ピッカー・グリッド ──
  let html='';

  // ── 年月ピッカー（共通スタイル流用） ──
  if(mobCalPickerOpen){
    const curY=new Date().getFullYear();
    const years=[curY-1,curY,curY+1,curY+2];
    html+=`<div style="background:var(--bg);border:2px solid var(--border-light);border-radius:24px;padding:16px 14px 14px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.08)">
      <div style="display:flex;gap:6px;margin-bottom:14px;justify-content:center">
        ${years.map(yr=>`<button onclick="mobCalSetYear(${yr})" style="padding:6px 12px;border-radius:999px;border:2px solid ${yr===y?'var(--dot)':'var(--border-light)'};background:${yr===y?'var(--dot)':'var(--card)'};color:${yr===y?'#fff':'var(--text2)'};font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;transform:scale(${yr===y?'1.06':'1'})">${yr}</button>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
        ${Array.from({length:12},(_,i)=>`<button onclick="mobCalSetMonth(${i})" style="aspect-ratio:1;border-radius:50%;border:2px solid ${i===m?'var(--dot)':'var(--border-light)'};background:${i===m?'var(--dot)':'var(--card)'};color:${i===m?'#fff':'var(--text)'};font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;transform:scale(${i===m?'1.1':'1'})">${i+1}</button>`).join('')}
      </div>
    </div>`;
  }

  // ── 曜日ヘッダー ──
  html+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px">
    ${['日','月','火','水','木','金','土'].map((d,i)=>`<div style="text-align:center;font-size:10px;font-weight:600;color:${i===0?'#e8547a':i===6?'#4a9fd4':'var(--text2)'};padding:3px 0">${d}</div>`).join('')}
  </div>`;

  // ── 日付グリッド ──
  html+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">`;
  let day=1,nextDay=1;
  for(let i=0;i<42;i++){
    let dNum,dateStr='',isOther=false;
    if(i<first){dNum=prevLast-first+i+1;isOther=true;}
    else if(day>last){dNum=nextDay++;isOther=true;}
    else{
      dNum=day;
      const mm=String(m+1).padStart(2,'0'),dd=String(day).padStart(2,'0');
      dateStr=`${y}-${mm}-${dd}`;
      day++;
    }
    const isToday=dateStr===td;
    const isSel=dateStr===mobCalSelected;
    const dow=i%7;
    const evs=dateStr?events.filter(e=>e.date===dateStr):[];
    const filtEvs=activeTagFilter?evs.filter(e=>(e.tags||[]).some(t=>t.name===activeTagFilter)):evs;
    const numColor=isOther?'var(--border)':dow===0?'#e8547a':dow===6?'#4a9fd4':'var(--text)';
    const numStyle=isToday
      ?'color:#fff;background:var(--dot);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:12px'
      :`color:${numColor};font-size:12px;text-align:center`;
    const cellBg=isSel?'var(--accent-light)':isToday?'transparent':'transparent';
    const cellBorder=isSel?'var(--dot)':'transparent';
    // イベントチップ（タグ色＋短縮タイトル）
    const chips=filtEvs.length?`<div style="display:flex;flex-direction:column;gap:2px;margin-top:3px">${filtEvs.slice(0,3).map(e=>{
      const bg=e.tags&&e.tags.length?e.tags[0].bg:'var(--dot)';
      const tc=e.tags&&e.tags.length?e.tags[0].text:'#fff';
      const label=(e.title||'').slice(0,5);
      return `<div style="background:${bg};color:${tc};font-size:8.5px;font-weight:600;border-radius:20px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.3">${label}</div>`;
    }).join('')}${filtEvs.length>3?`<div style="font-size:8px;color:var(--text2);text-align:center;padding:1px 0">+${filtEvs.length-3}</div>`:''}</div>`:'';
    html+=`<div style="padding:4px 2px 5px;border-radius:8px;cursor:${dateStr?'pointer':'default'};background:${cellBg};border:1.5px solid ${cellBorder};min-height:58px"
      ${dateStr?`onclick="mobCalSelect('${dateStr}')"`:''}>
      <div style="${numStyle}${isToday?'':';font-weight:600'}">${dNum}</div>
      ${chips}
    </div>`;
    if(day>last+1&&i>=34&&i%7===6)break;
  }
  html+=`</div>`;
  grid.innerHTML=html;
}

window.mobCalSelect=function(dateStr){
  mobCalSelected=dateStr;
  buildMobCal();
  const[y,mo,d]=dateStr.split('-');
  const title=document.getElementById('mobCalPanelTitle');
  const list=document.getElementById('mobCalEventList');
  if(title)title.textContent=`${parseInt(y)}年${parseInt(mo)}月${parseInt(d)}日`;
  let evs=events.filter(e=>e.date===dateStr);
  if(activeTagFilter)evs=evs.filter(e=>(e.tags||[]).some(t=>t.name===activeTagFilter));
  if(list){
    if(evs.length){
      // mob-cardスタイルで表示
      list.innerHTML=`<div style="display:flex;flex-direction:column;gap:0">${evs.map(e=>mobCardHTML(e)).join('')}</div>`;
    } else {
      list.innerHTML=`<div class="empty"><i class="ti ti-calendar-off" style="font-size:22px;display:block;margin-bottom:6px"></i>イベントなし</div>`;
    }
  }
};

document.getElementById('mobCalBtn').addEventListener('click',()=>{

// ─── テーマカラー ───
let currentThemeColor='';
window.setThemeColor=function(cls){
  const body=document.body;
  ['theme-pink','theme-mint','theme-lavender','theme-peach','theme-sky'].forEach(c=>body.classList.remove(c));
  if(cls)body.classList.add(cls);
  currentThemeColor=cls;
  document.querySelectorAll('.color-swatch').forEach(s=>{
    s.classList.toggle('active', s.getAttribute('onclick')===`setThemeColor('${cls}')`||(cls===''&&s.getAttribute('onclick')==="setThemeColor('')"));
  });
  const cpw=document.getElementById('colorPickerWrap');if(cpw)cpw.style.display='none';
  const cpp=document.getElementById('colorPickerPopup');if(cpp)cpp.style.display='none';
};
window.toggleColorPicker=function(ev){
  if(window.innerWidth>540){
    // PC: ポップアップ
    const popup=document.getElementById('colorPickerPopup');
    if(!popup)return;
    const isOpen=popup.style.display!=='none';
    popup.style.display=isOpen?'none':'block';
    if(!isOpen){
      // 外クリックで閉じる
      setTimeout(()=>{
        const close=function(e){if(!popup.contains(e.target)&&e.target!==ev.currentTarget){popup.style.display='none';document.removeEventListener('click',close);}};
        document.addEventListener('click',close);
      },0);
    }
  } else {
    const cpw=document.getElementById('colorPickerWrap');
    if(!cpw)return;
    cpw.style.display=cpw.style.display==='none'?'block':'none';
  }
};

// ─── 共通 年月ラベル更新 ───
let mainPickerOpen=false;
function updateMainLabel(type,y,m){
  const arrow=mainPickerOpen?'ti-chevron-up':'ti-chevron-down';
  const lbl=`${y}年 ${m+1}月 <i class="ti ${arrow}" style="font-size:11px;color:var(--text2)"></i>`;
  if(type==='main'){const el=document.getElementById('monthLabel');if(el)el.innerHTML=lbl;}
  else{const el=document.getElementById('mmonthLabel');if(el)el.innerHTML=lbl;}
}

// ─── メインピッカー ポップアップ ───
window.toggleMainPicker=function(){
  mainPickerOpen=!mainPickerOpen;
  renderMainPicker();
};
function closeMainPicker(){
  mainPickerOpen=false;
  const wm=document.getElementById('mainPickerWrap');
  const wd=document.getElementById('mainPickerWrapDesk');
  if(wm)wm.style.display='none';
  if(wd)wd.style.display='none';
  // overlay bg remove
  document.querySelectorAll('.picker-overlay-bg').forEach(el=>el.remove());
  buildCalendar();renderMobile();
}
function renderMainPicker(){
  const isMob=window.innerWidth<=540;
  const wrap=isMob?document.getElementById('mainPickerWrap'):document.getElementById('mainPickerWrapDesk');
  if(!wrap)return;
  if(!mainPickerOpen){
    wrap.style.display='none';
    document.querySelectorAll('.picker-overlay-bg').forEach(el=>el.remove());
    buildCalendar();renderMobile();
    return;
  }
  const date=isMob?mobileDate:currentDate;
  const y=date.getFullYear(),m=date.getMonth();
  const curY=new Date().getFullYear();
  const years=[curY-1,curY,curY+1,curY+2];
  wrap.innerHTML=`<div class="main-picker-popup">
    <div class="picker-years">
      ${years.map(yr=>`<button class="picker-year-btn${yr===y?' sel':''}" onclick="mainPickerSetYear(${yr})">${yr}</button>`).join('')}
    </div>
    <div class="picker-months">
      ${Array.from({length:12},(_,i)=>`<button class="picker-month-btn${i===m?' sel':''}" onclick="mainPickerSetMonth(${i})">${i+1}</button>`).join('')}
    </div>
  </div>`;
  wrap.style.display='block';
  // overlay bg for outside click
  if(!document.querySelector('.picker-overlay-bg')){
    const bg=document.createElement('div');
    bg.className='picker-overlay-bg';
    bg.addEventListener('click',closeMainPicker);
    document.body.appendChild(bg);
  }
  buildCalendar();renderMobile();
}
window.mainPickerSetYear=function(yr){
  const isMob=window.innerWidth<=540;
  if(isMob)mobileDate=new Date(yr,mobileDate.getMonth(),1);
  else currentDate=new Date(yr,currentDate.getMonth(),1);
  renderMainPicker();
};
window.mainPickerSetMonth=function(mo){
  const isMob=window.innerWidth<=540;
  if(isMob)mobileDate=new Date(mobileDate.getFullYear(),mo,1);
  else currentDate=new Date(currentDate.getFullYear(),mo,1);
  mainPickerOpen=false;
  renderMainPicker();
};

// ─── スマホタブ切り替え ───
let mobActiveTab='schedule';
window.switchMobTab=function(tab){
  mobActiveTab=tab;
  document.getElementById('tabSchedule').classList.toggle('active',tab==='schedule');
  document.getElementById('tabCal').classList.toggle('active',tab==='cal');
  const mv=document.getElementById('mobileView');
  const fab=document.getElementById('mobAddBtn');
  const ov=document.getElementById('mobCalOverlay');
  const mobnav=document.getElementById('mobNav')||document.querySelector('.mob-nav');
  if(tab==='cal'){
    mv.style.display='none';
    if(mobnav)mobnav.style.display='none';
    ov.classList.add('open');
    mobCalDate=new Date(mobileDate.getFullYear(),mobileDate.getMonth(),1);
    mobCalPickerOpen=false;
    buildMobCal();
  } else {
    mv.style.display='';
    if(mobnav)mobnav.style.display='';
    ov.classList.remove('open');
    scrollToNextEvent();
  }
};



function scrollToNextEvent(){
  const mv=document.getElementById('mobileView');
  if(!mv)return;
  const cards=mv.querySelectorAll('[data-event-date]');
  if(!cards.length)return;
  const td=todayStr();
  let targetCard=null;
  cards.forEach(c=>{
    if(!targetCard&&c.dataset.eventDate>=td) targetCard=c;
  });
  if(targetCard){
    setTimeout(()=>{
      const rect=targetCard.getBoundingClientRect();
      const absTop=rect.top+window.scrollY;
      // sticky要素（mob-tabs + mob-nav + tag-filter-bar）の合計高さ分オフセット
      const tabsH=document.getElementById('mobTabs')?.offsetHeight||0;
      const navH=document.querySelector('.mob-nav')?.offsetHeight||0;
      const filterH=document.getElementById('tagFilterBar')?.offsetHeight||0;
      window.scrollTo({top:absTop-(tabsH+navH+filterH+6),behavior:'instant'});
    },80);
  }
}
applyTheme(currentTheme);buildDD('themeDD');buildDD('mthemeDD');buildCalendar();renderPanel();renderMobile();scrollToNextEvent();


// スワイプでカレンダーオーバーレイ開閉
(function(){
  let txStart=0,tyStart=0;
  const ov=document.getElementById('mobCalOverlay');
  // メインエリアで右スワイプ → カレンダーを開く
  document.addEventListener('touchstart',function(e){
    txStart=e.touches[0].clientX;tyStart=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(document.getElementById('modalContainer').innerHTML)return;
    const dx=e.changedTouches[0].clientX-txStart;
    const dy=e.changedTouches[0].clientY-tyStart;
    if(Math.abs(dx)>Math.abs(dy)*1.5&&Math.abs(dx)>50){
      if(dx>0&&!ov.classList.contains('open')){
        switchMobTab('cal');
      } else if(dx<0&&ov.classList.contains('open')){
        switchMobTab('schedule');
      }
    }
  },{passive:true});
})();

// iOSキーボード閉じた後に画面位置を元に戻す
(function(){
  let lastScrollY=0;
  document.addEventListener('focusin',function(e){
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT'||e.target.tagName==='SELECT'){
      lastScrollY=window.scrollY;
    }
  });
  document.addEventListener('focusout',function(e){
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT'||e.target.tagName==='SELECT'){
      setTimeout(function(){
        window.scrollTo({top:lastScrollY,behavior:'instant'});
      },150);
    }
  });
})();
